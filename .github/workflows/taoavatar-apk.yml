name: Build TaoAvatar APK

on:
  workflow_dispatch:
  push:
    paths:
      - 'apps/Android/MnnTaoAvatar/**'

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3

      - name: Set up JDK 17
        uses: actions/setup-java@v3
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Download MNN Android prebuilt libs
        run: |
          wget -q https://github.com/alibaba/MNN/releases/download/3.4.1/mnn_3.4.1_android_armv7_arm8_cpu_opencl_vulkan.zip
          unzip -q mnn_3.4.1_android_armv7_arm8_cpu_opencl_vulkan.zip -d mnn_android

      - name: Copy .so files to jniLibs
        run: |
          mkdir -p apps/Android/MnnTaoAvatar/app/src/main/jniLibs/arm64-v8a
          mkdir -p apps/Android/MnnTaoAvatar/app/src/main/jniLibs/armeabi-v7a
          find mnn_android -name "*.so" | while read f; do
            dir=$(basename $(dirname $f))
            cp $f apps/Android/MnnTaoAvatar/app/src/main/jniLibs/$dir/ 2>/dev/null || true
          done
          cp mnn_android/**/*.so apps/Android/MnnTaoAvatar/app/src/main/jniLibs/arm64-v8a/ 2>/dev/null || true

      - name: Build Debug APK
        working-directory: apps/Android/MnnTaoAvatar
        run: |
          chmod +x gradlew
          ./gradlew assembleDebug --no-daemon

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: TaoAvatar-debug
          path: apps/Android/MnnTaoAvatar/app/build/outputs/apk/debug/*.apk
